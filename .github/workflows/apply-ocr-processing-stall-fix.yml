name: Apply OCR processing stall fix

on:
  workflow_dispatch:
  push:
    branches:
      - agent/fix-ocr-processing-stall

permissions:
  contents: write

jobs:
  apply-fix:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Decode patch runner
        shell: bash
        run: |
          echo '' | base64 -d | gzip -d > /tmp/apply-fix.mjs
          node /tmp/apply-fix.mjs .

      - name: Run tests
        run: npm test

      - name: Run checks
        run: npm run check

      - name: Run build
        run: npm run build

      - name: Commit generated fix
        shell: bash
        run: |
          git config user.name 'ChatGPT Automation'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add web tests package.json
          if git diff --cached --quiet; then
            echo 'No changes to commit'
            exit 0
          fi
          git commit -m 'Fix OCR processing stall and worker recovery'
          git push origin HEAD:agent/fix-ocr-processing-stall
