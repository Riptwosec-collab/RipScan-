name: RipScan CI

on:
  push:
    branches:
      - main
      - fix/review-first-cover-sara-am
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ripscan-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Unit and regression tests
        shell: bash
        run: |
          set +e
          npm test > test.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            echo "::group::Focused test failure log"
            tail -n 220 test.log
            echo "::endgroup::"
            exit "$status"
          fi
          tail -n 45 test.log

      - name: Syntax check
        run: npm run check

      - name: Static build
        run: node build.mjs
