name: Restore source safely

on:
  push:
    branches:
      - agent/fix-ripscan-runnable
    paths:
      - .github/workflows/restore-source-safe.yml

permissions:
  contents: write

jobs:
  restore:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-ripscan-runnable
          fetch-depth: 0

      - name: Decode verified source archive
        shell: bash
        run: |
          set -euo pipefail
          cat .bootstrap/chunk-* > /tmp/source.tar.gz.b64
          base64 --decode /tmp/source.tar.gz.b64 > /tmp/source.tar.gz
          echo "7ce7a305abe5a3655576f6e2488b827c043bf2858accbc5812ec77e041f9f192  /tmp/source.tar.gz" | sha256sum --check -

          # Workflow files are intentionally excluded. GITHUB_TOKEN may write
          # repository contents, but modifying workflow files from a workflow
          # can be rejected. They are managed separately through GitHub API.
          tar -xzf /tmp/source.tar.gz --exclude='.github' --exclude='.github/*'
          rm -rf .bootstrap

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A -- ':!.github/workflows'
          git commit -m "feat: restore OCR application source"
          git push origin HEAD:agent/fix-ripscan-runnable
