name: RipScan CI

on:
  push:
    branches:
      - main
      - fix/review-first-cover-sara-am
      - fix/cover-hard-block-sara-am-v21
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ripscan-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit and regression tests
        shell: bash
        run: |
          set -o pipefail
          npm test 2>&1 | tee test.log

      - name: Upload complete test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ripscan-test-log
          path: test.log
          if-no-files-found: warn
          retention-days: 3

      - name: Syntax check
        run: npm run check

      - name: Static build
        run: node build.mjs
