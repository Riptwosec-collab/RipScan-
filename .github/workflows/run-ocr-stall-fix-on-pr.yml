name: Run OCR stall fix on PR

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  apply-and-verify:
    if: github.head_ref == 'agent/fix-ocr-processing-stall'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Extract and run patch
        shell: bash
        run: |
          python - <<'PY'
          import re, pathlib, base64, gzip
          source = pathlib.Path('.github/workflows/apply-ocr-processing-stall-fix.yml').read_text()
          match = re.search(r"echo '([^']+)' \| base64", source)
          if not match:
              raise SystemExit('Embedded patch not found')
          pathlib.Path('/tmp/apply-fix.mjs').write_bytes(gzip.decompress(base64.b64decode(match.group(1))))
          PY
          node /tmp/apply-fix.mjs .
      - name: Commit applied fix
        shell: bash
        run: |
          git config user.name 'ChatGPT Automation'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add web tests package.json
          if git diff --cached --quiet; then
            echo 'Patch is already applied'
            exit 0
          fi
          git commit -m 'Fix OCR processing stall and worker recovery'
          git push origin HEAD:${{ github.head_ref }}
      - name: Run tests
        run: npm test
      - name: Run checks
        run: npm run check
      - name: Run build
        run: npm run build
