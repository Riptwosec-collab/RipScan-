name: Hotfix production build transform

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/hotfix-build-performance.yml

permissions:
  contents: write

jobs:
  patch-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Patch build transform
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('build-performance.mjs')
          source = path.read_text()
          old = '''const progressUiPath = 'dist/performance-v22-ui.js';
          let progressUi = await readFile(progressUiPath, 'utf8');
          progressUi = replaceRequired(
            progressUi,
            '      Promise.resolve(window.RipScanBookOCR?.cancel?.()),',
            "      Promise.allSettled([window.RipScanBookOCR?.cancel?.(), window.RipScanLegacyOCR?.cancel?.(), window.RipScanPerformanceRuntime?.cancelAll?.('USER_CANCELLED')]),",
            'global cancel propagation',
          );
          await writeFile(progressUiPath, progressUi, 'utf8');'''
          new = '''const progressUiPath = 'dist/performance-v22-ui.js';
          let progressUi = await readFile(progressUiPath, 'utf8');
          const hasGlobalCancel = progressUi.includes('RipScanLegacyOCR?.cancel?.()')
            && progressUi.includes('RipScanPerformanceRuntime?.cancelAll?.(');
          if (!hasGlobalCancel) {
            progressUi = replaceRequired(
              progressUi,
              '      Promise.resolve(window.RipScanBookOCR?.cancel?.()),',
              "      Promise.allSettled([window.RipScanBookOCR?.cancel?.(), window.RipScanLegacyOCR?.cancel?.(), window.RipScanPerformanceRuntime?.cancelAll?.('USER_CANCELLED')]),",
              'global cancel propagation',
            );
          }
          await writeFile(progressUiPath, progressUi, 'utf8');'''
          if old not in source:
              raise SystemExit('build transform block not found')
          path.write_text(source.replace(old, new))
          PY
      - name: Commit hotfix and remove one-time workflow
        shell: bash
        run: |
          git config user.name 'ChatGPT Automation'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git rm .github/workflows/hotfix-build-performance.yml
          git add build-performance.mjs
          git commit -m 'Fix production build transform for guarded OCR cancellation'
          git push origin main
